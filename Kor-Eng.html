<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>주식 모니터</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #fafafa;
    --bg-card: #ffffff;
    --border: #e5e7eb;
    --text: #111;
    --text-muted: #6b7280;
    --up: #d92d20;        /* 한국식: 상승 빨강 */
    --down: #1d4ed8;      /* 한국식: 하락 파랑 */
    --flat: #6b7280;
    --primary: #3b82f6;
    --primary-hover: #2563eb;
    --secondary: #e5e7eb;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg: 0 10px 30px rgba(0,0,0,0.12);
    --font-stack: "Helvetica Neue", Helvetica, "Noto Sans KR", Arial, sans-serif;
    --mono: "JetBrains Mono", "Fira Code", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-stack);
    background: var(--bg-soft);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
  }
  header h1 {
    font-size: 16px; margin: 0; font-weight: 600; letter-spacing: -0.01em;
  }
  header .right { display: flex; gap: 8px; align-items: center; }
  #statusBar {
    font-size: 12px; color: var(--text-muted);
    margin-right: 8px;
  }
  #statusBar.error { color: var(--up); }
  #statusBar.ok { color: #059669; }
  .icon-btn {
    width: 34px; height: 34px; border: 1px solid var(--border);
    border-radius: 8px; background: #fff; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .icon-btn:hover { background: #f3f4f6; }

  main { padding: 10px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px;
  }
  /* Force 8 columns on wide screens so 32 cards fit nicely in 8x4 */
  @media (min-width: 1400px) {
    .grid { grid-template-columns: repeat(8, 1fr); }
  }
  /* 2 columns on narrow mobile */
  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    main { padding: 6px; }
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    box-shadow: var(--shadow);
    transition: border-color .15s ease;
    position: relative;
    min-height: 130px;
    display: flex; flex-direction: column;
  }
  .card:hover { border-color: #cbd5e1; }
  .card.kr::before, .card.us::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    border-top-left-radius: 10px; border-top-right-radius: 10px;
  }
  .card.kr::before { background: #ef4444; }
  .card.us::before { background: #2563eb; }
  .card-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 4px; gap: 6px;
  }
  .card-name {
    font-weight: 600; font-size: 13px; line-height: 1.2;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-ticker {
    font-family: var(--mono); font-size: 10px;
    color: var(--text-muted); flex-shrink: 0;
  }
  .card-price {
    font-family: var(--mono);
    font-size: 20px; font-weight: 700; letter-spacing: -0.02em;
    line-height: 1.1; margin: 2px 0;
  }
  .card-price.up { color: var(--up); }
  .card-price.down { color: var(--down); }
  .card-change {
    font-family: var(--mono); font-size: 11px;
  }
  .card-change.up { color: var(--up); }
  .card-change.down { color: var(--down); }
  .card-meta {
    display: flex; gap: 8px; margin-top: 6px;
    font-size: 10px; color: var(--text-muted);
  }
  .card-meta span b { color: var(--text); font-weight: 600; }
  .card-graph {
    margin-top: 6px;
    width: 100%; height: 36px;
    background: #fafafa; border-radius: 4px;
  }
  .card-closed-tag {
    position: absolute; top: 6px; right: 6px;
    background: #f3f4f6; color: var(--text-muted);
    font-size: 9px; padding: 2px 5px; border-radius: 4px;
    border: 1px solid var(--border);
  }
  .card-past {
    display: flex; flex-wrap: wrap; gap: 4px 8px;
    margin-top: 6px; font-size: 10px;
  }
  .card-past .pp {
    color: var(--text-muted);
  }
  .card-past .pp b { color: var(--text); font-family: var(--mono); }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    display: none; align-items: center; justify-content: center;
    z-index: 200; padding: 16px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: #fff; border-radius: 12px;
    padding: 18px; min-width: 320px; max-width: 520px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal h2 { margin: 0 0 12px 0; font-size: 16px; font-weight: 600; }
  .modal-row {
    display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px;
  }
  .modal-row label {
    font-size: 12px; color: var(--text-muted); font-weight: 500;
  }
  .modal-row input, .modal-row select {
    padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
    font-family: var(--font-stack); font-size: 13px; background: #fff;
  }
  .modal-row input[type="text"], .modal-row input[type="password"] {
    font-family: var(--mono);
  }
  .modal-actions {
    display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px;
  }
  .btn {
    padding: 8px 14px; border-radius: 6px; border: 1px solid transparent;
    cursor: pointer; font-family: var(--font-stack); font-size: 13px;
    font-weight: 500;
  }
  .btn.primary { background: var(--primary); color: #fff; }
  .btn.primary:hover { background: var(--primary-hover); }
  .btn.primary:disabled { background: #93c5fd; cursor: not-allowed; }
  .btn.secondary { background: var(--secondary); color: var(--text); }
  .btn.secondary:hover { background: #d1d5db; }

  /* Detail (full-screen) view */
  #detailView {
    position: fixed; inset: 0; background: #fff; z-index: 300;
    display: none; flex-direction: column;
    overflow-y: auto;
  }
  #detailView.open { display: flex; }
  #detailView .detail-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: #fff; z-index: 1;
  }
  #detailView .detail-title { font-size: 18px; font-weight: 600; }
  #detailView .detail-sub {
    font-size: 12px; color: var(--text-muted); font-family: var(--mono);
  }
  #detailView .detail-body {
    padding: 16px; display: flex; flex-direction: column; gap: 16px;
  }
  #detailView .detail-price {
    font-family: var(--mono); font-size: 36px; font-weight: 700;
  }
  #detailView .detail-graph {
    width: 100%; height: 320px; background: #fafafa;
    border-radius: 8px; border: 1px solid var(--border);
  }
  #detailView .past-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px;
  }
  #detailView .past-cell {
    background: var(--bg-soft); border: 1px solid var(--border);
    padding: 10px; border-radius: 6px;
  }
  #detailView .past-cell .past-label { font-size: 11px; color: var(--text-muted); }
  #detailView .past-cell .past-val {
    font-family: var(--mono); font-size: 16px; font-weight: 600; margin-top: 2px;
  }
  #detailView .past-cell select {
    width: 100%; margin-top: 6px; padding: 4px 6px;
    border: 1px solid var(--border); border-radius: 4px; font-size: 11px;
  }
  @media (max-width: 480px) {
    #detailView .detail-graph { height: 200px; }
    #detailView .detail-price { font-size: 28px; }
  }

  /* Loading / message overlay */
  #toast {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: #111; color: #fff; padding: 8px 14px; border-radius: 6px;
    font-size: 12px; opacity: 0; transition: opacity .2s; z-index: 1000;
    pointer-events: none; max-width: 90vw;
  }
  #toast.show { opacity: 1; }
  #toast.error { background: #b91c1c; }
  #toast.ok    { background: #059669; }

  .section-label {
    font-size: 11px; color: var(--text-muted); margin: 12px 4px 6px;
    text-transform: uppercase; letter-spacing: .05em; font-weight: 600;
  }

  .note {
    font-size: 11px; color: var(--text-muted); margin-top: 4px;
    line-height: 1.4;
  }
  .past-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
  .past-row select { flex: 1; }
</style>
</head>

<script>
// ============================================================
// 주식 모니터 — Stock Monitor (single-file HTML app)
// ============================================================

// --------- Supabase config (hardcoded per skill) ---------
const SUPABASE_URL = 'https://upqnxyllnenivehmallp.supabase.co';

const DATA_FILE    = 'stock_pl_settings.csv';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// --------- Constants ---------
const DEFAULT_KOSPI = [

  {ticker:'000660', name:'SK하이닉스'},

// Past-day options shown in dropdowns
const PAST_OPTIONS = [
  {key:'1d',  label:'1일 전 (어제)',     days:1},

function pastByKey(k){ return PAST_OPTIONS.find(p=>p.key===k) || PAST_OPTIONS[0]; }

// --------- App state ---------
const state = {
  settings: null,            // global settings object
  stocks: { kr: [], us: [] }, // arrays of {ticker, name, past: [...4 keys]}
  prices: {},                // ticker -> {price, prevClose, per, roe, openPrice, history:[{t,v}], pastCloses:{key:val}}

// --------- Helpers ---------
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

function setStatus(text, kind=''){
  const el = $('#statusBar');
  el.textContent = text;
  el.className = kind;
}
function toast(msg, kind=''){
  const el = $('#toast');
  el.textContent = msg;
  el.className = 'show ' + kind;
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.className = ''; }, 2400);
}
function fmtNum(n, decimals){
  if (n == null || isNaN(n)) return '—';
  if (decimals == null) decimals = (n >= 1000 ? 0 : 2);
  return Number(n).toLocaleString('ko-KR', {minimumFractionDigits:decimals, maximumFractionDigits:decimals});
}
function fmtPct(n){
  if (n == null || isNaN(n)) return '—';
  const sign = n > 0 ? '+' : '';
  return sign + Number(n).toFixed(2) + '%';
}
function isMarketKR_open(now=new Date()){
  // KST 09:00–15:30, Mon–Fri. Convert "now" to KST.
  const kstNow = new Date(now.getTime() + (9*60 - now.getTimezoneOffset()) * 60000);
  const day = kstNow.getUTCDay(); // we just shifted using UTC math; use UTC getters
  if (day === 0 || day === 6) return false;
  const minutes = kstNow.getUTCHours()*60 + kstNow.getUTCMinutes();
  return minutes >= 9*60 && minutes <= 15*60+30;
}
function isMarketUS_open(now=new Date()){
  // NYSE/NASDAQ 09:30–16:00 ET (Mon–Fri)
  // Robust against Chrome locale spacing/parsing quirks.
  try {
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone: 'America/New_York',
      weekday: 'short',
      hour: '2-digit',
      minute: '2-digit',
      hourCycle: 'h23'
    }).formatToParts(now);

    const map = {};
    for (const p of parts){
      if (p.type !== 'literal') map[p.type] = p.value;
    }

    const weekday = map.weekday;
    if (weekday === 'Sun' || weekday === 'Sat') return false;

    const hour = Number(map.hour);
    const minute = Number(map.minute);

    if (!Number.isFinite(hour) || !Number.isFinite(minute)) {
      console.warn('US market time parse failed', map);
      return false;
    }

    const mins = hour * 60 + minute;

    // 09:30 <= time < 16:00
    return mins >= 570 && mins < 960;

  } catch(e){
    console.warn('isMarketUS_open failed', e);
    return false;
  }
}

// --------- Supabase load/save ---------
async function loadSettings(){
  setStatus('설정 로딩 중…');
  try {
    const { data: { publicUrl } } = sb.storage.from(BUCKET).getPublicUrl(DATA_FILE);
    const r = await fetch(publicUrl + '?t=' + Date.now(), {
      cache:'no-store',
      headers:{ 'Cache-Control':'no-cache, no-store' }
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const txt = await r.text();
    const parsed = parseSettingsCSV(txt);
    return parsed;
  } catch(e){
    console.warn('Settings load failed, using defaults:', e);
    return null;
  }
}
function parseSettingsCSV(txt){
  // Expect 2 rows: header "key,value" then "config,<json>"
  const lines = txt.split(/\r?\n/).filter(l=>l.length);
  if (lines.length < 2) return null;
  // Find the config row (parse RFC-4180-ish — value is everything after the first comma)
  for (let i=1; i<lines.length; i++){
    const line = lines[i];
    const idx = line.indexOf(',');
    if (idx < 0) continue;
    const key = line.slice(0, idx).trim().replace(/^"|"$/g,'');
    if (key !== 'config') continue;
    let val = line.slice(idx+1);
    // Multi-line JSON could have been written; gather remaining lines if quotes not balanced
    let combined = val;
    let j = i;
    while (j+1 < lines.length && !rfc4180Balanced(combined)){
      j++;
      combined += '\n' + lines[j];
    }
    // strip surrounding quotes, unescape doubled quotes
    combined = combined.trim();
    if (combined.startsWith('"') && combined.endsWith('"')){
      combined = combined.slice(1,-1).replace(/""/g,'"');
    }
    try { return JSON.parse(combined); } catch(e){ console.warn('JSON parse error', e); return null; }
  }
  return null;
}
function rfc4180Balanced(s){
  let c = 0;
  for (let k=0;k<s.length;k++) if (s[k]==='"') c++;
  return c % 2 === 0;
}
async function uploadSettingsCSV(payload){
  const json    = JSON.stringify(payload);
  const escaped = '"' + json.replace(/"/g,'""') + '"';
  const csv     = 'key,value\nconfig,' + escaped + '\n';
  const blob    = new Blob([csv], {type:'text/csv'});
  const { error } = await sb.storage.from(BUCKET).upload(DATA_FILE, blob, {
    upsert: true, contentType: 'text/csv'
  });
  if (error) throw error;
}

// --------- KIS global rate limiter (1 req/sec, timestamp-based) ---------
const _kisLimiter = (() => {
  const GAP = 1000; // ms between any two KIS requests
  const queue = [];
  let lastAt = 0;
  let timer = null;
  function schedule(){
    if (timer) return;
    const delay = Math.max(0, lastAt + GAP - Date.now());
    timer = setTimeout(() => {
      timer = null;
      if (!queue.length) return;
      const { fn, resolve, reject } = queue.shift();
      lastAt = Date.now();
      fn().then(resolve, reject);
      if (queue.length) schedule();
    }, delay);
  }
  return {
    fetch(...args){
      return new Promise((resolve, reject) => {
        queue.push({ fn: () => fetch(...args), resolve, reject });
        schedule();
      });
    }
  };
})();

function kisBase(){
  return state.settings.kisEnv === 'vts'

    : 'https://openapi.koreainvestment.com:9443';

function withProxy(url){
  const p = state.settings.proxyUrl;
  if (!p) return url;
  // Simple convention: PROXY/<full url>
  if (p.endsWith('/')) return p + url;
  return p + '/' + url;

async function kisGetToken(){
  const now = Date.now();
  if (state.kisToken && state.kisToken.expires_at > now + 60000) return state.kisToken.access_token;
  if (!state.settings.kisKey || !state.settings.kisSecret) throw new Error('KIS App Key/Secret 미설정');
  // KIS rate-limits token issuance to once per minute (EGW00133)
  if (state.kisTokenPending) return state.kisTokenPending;
  if (state.kisLastTokenAt && now - state.kisLastTokenAt < 62000)
    throw new Error('KIS 토큰 재발급 대기 중 (1분 제한)');
  state.kisLastTokenAt = now;
  state.kisTokenPending = (async () => {
    try {
      const r = await _kisLimiter.fetch(withProxy(kisBase() + '/oauth2/tokenP'), {
        method:'POST',
        headers: {'Content-Type':'application/json; charset=utf-8'},
        body: JSON.stringify({
          grant_type:'client_credentials',
          appkey: state.settings.kisKey,
          appsecret: state.settings.kisSecret,
        })
      });
      if (!r.ok){
        const t = await r.text();
        throw new Error('KIS 토큰 발급 실패: ' + r.status + ' ' + t.slice(0,200));
      }
      const j = await r.json();
      state.kisToken = {
        access_token: j.access_token,
        expires_at: now + (j.expires_in ? j.expires_in*1000 : 23*3600*1000),
      };
      // Persist token to cloud so it survives page reloads (valid 24h)
      state.settings.kisTokenData = { access_token: state.kisToken.access_token, expires_at: state.kisToken.expires_at };
      uploadSettingsCSV(buildSettingsPayload()).catch(e => console.warn('Token save failed:', e.message));
      console.log('[KIS] New token saved to cloud, valid until', new Date(state.kisToken.expires_at).toLocaleString());
      return state.kisToken.access_token;
    } finally {
      state.kisTokenPending = null;
    }
  })();
  return state.kisTokenPending;
}

  const url = withProxy(kisBase() +
    '/uapi/domestic-stock/v1/quotations/inquire-price'
    + '?FID_COND_MRKT_DIV_CODE=J&FID_INPUT_ISCD=' + encodeURIComponent(ticker));

      'appsecret': state.settings.kisSecret,

    throw new Error('KIS 시세 조회 실패: ' + r.status + ' ' + body.slice(0,300));
  }
  const j = await r.json();

let _wsFails = 0;
function finnhubWsConnect(){
  if (state.finnhubWs){ try { state.finnhubWs.close(); } catch(e){} state.finnhubWs = null; }
  const k = state.settings.finnhubKey;
  if (!k) return;
  const ws = new WebSocket('wss://ws.finnhub.io?token=' + encodeURIComponent(k));
  state.finnhubWs = ws;
  ws.addEventListener('open', () => {
    _wsFails = 0;
    state.stocks.us.forEach(s => {
      ws.send(JSON.stringify({type:'subscribe', symbol: s.ticker}));
    });
  });
  ws.addEventListener('message', (ev) => {
    try {
      const m = JSON.parse(ev.data);
      if (m.type === 'trade' && Array.isArray(m.data)){
        m.data.forEach(t => {
          const sym = t.s; const px = t.p; const ts = t.t;
          const ent = state.prices[sym] || (state.prices[sym] = {});
          ent.price = px;

          // Detect whether NASDAQ market is actually active by checking
          // if price changes within the first 20 received updates.
          let activity = state.marketActivity[sym];

          if (!activity){
            activity = state.marketActivity[sym] = {
              initialPrice: px,
              checks: 0,
              active: false,
              stopped: false
            };
          }

          if (!activity.stopped){
            activity.checks++;

            if (px !== activity.initialPrice){
              activity.active = true;
              activity.stopped = true;

              // Immediately remove 장마감 tag
              const card = findCard(sym);
              if (card){
                const tag = card.querySelector('.card-closed-tag');
                if (tag) tag.style.display = 'none';
              }
            }

            // Stop monitoring after 20 updates even if unchanged
            if (activity.checks >= 20){
              activity.stopped = true;
            }
          }

          ent.history = ent.history || [];
          // Bootstrap: if this is the very first trade point and we have prevClose,
          // inject a synthetic anchor 60 s before so the graph immediately has ≥2 points.
          if (ent.history.length === 0 && ent.prevClose != null && ent.prevClose > 0){
            ent.history.push({t: ts - 60000, v: ent.prevClose});
          }
          ent.history.push({t:ts, v:px});
          if (ent.history.length > 5000) ent.history = ent.history.slice(-3000);
          renderCardPrice(sym);
          if (state.detailTicker === sym) renderDetailLive();
        });
      }
    } catch(e){}
  });
  ws.addEventListener('close', () => {
    if (!state.settings.finnhubKey) return;
    _wsFails++;
    const delay = Math.min(5000 * Math.pow(2, _wsFails - 1), 120000); // 5s, 10s, 20s … max 2min
    setTimeout(() => { if (state.settings.finnhubKey) finnhubWsConnect(); }, delay);
  });
  ws.addEventListener('error', () => {}); // close fires after error; handled there
}

async function yahooFetchChart(symbol, params){

  if (state.settings.proxyUrl){
    const url = `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?${qs}`;

    const res = j.chart?.result?.[0]; if (!res) throw new Error('Yahoo proxy no result');
    return res;
  }
  // No proxy — try direct (works on deployed domains like GitHub Pages)
  for (const host of ['query2', 'query1']){
    try {
      const url = `https://${host}.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?${qs}`;
      const r = await fetch(url, {cache:'no-store', headers:{Accept:'application/json'}});

      const res = j.chart?.result?.[0];
      if (res) return res;
    } catch(e){ /* CORS or rate-limit — silent */ }
  }
  throw new Error('Yahoo CORS — set a proxy URL in Global Settings');
}

// --------- Past closing price resolution ---------
function pickPastClose(history, daysAgo){
  // history: [{date:'YYYYMMDD', close:N}, ...] sorted newest first
  // We want the trading-day closest to (today - daysAgo), or just the n-th most recent if it's a "1d","2d" style.
  // Strategy: count back N trading days. So daysAgo=1 → history[0] (yesterday's close, assuming today not yet closed).
  if (!history || !history.length) return null;
  const idx = Math.min(daysAgo - 1, history.length - 1);
  if (idx < 0) return null;
  return history[idx].close;
}

}

const _graphDebounce = {};
function drawCardGraph(card, p){
  const ticker = card.dataset.ticker;
  clearTimeout(_graphDebounce[ticker]);
  _graphDebounce[ticker] = setTimeout(() => {
    const canvas = card.querySelector('.card-graph');
    if (!canvas) return;
    if (!p.history || p.history.length < 2){
      const ctx = canvas.getContext('2d');
      if (canvas.width > 0) ctx.clearRect(0,0,canvas.width, canvas.height);
      return;
    }
    const graphColor = p.prevClose
      ? (p.price > p.prevClose ? '#d92d20' : p.price < p.prevClose ? '#1d4ed8' : '#374151')
      : '#374151';
    drawLineGraph(canvas, p.history, p.prevClose, { lineColor: graphColor });
  }, 150); // debounce: max one redraw per 150ms per card
}
function drawLineGraph(canvas, history, refLine, opts={}){
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  if (canvas.width !== rect.width*dpr || canvas.height !== rect.height*dpr){
    canvas.width = rect.width*dpr; canvas.height = rect.height*dpr;
  }
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const W = rect.width, H = rect.height;
  ctx.clearRect(0,0,W,H);
  if (!history || history.length < 2) return;
  // Auto-detect intraday vs daily data by median gap between points
  const tSpan = history[history.length-1].t - history[0].t;
  const isDailyData = tSpan > 12 * 3600 * 1000 &&
    (history.length < 3 || (history[1].t - history[0].t) > 3600 * 1000);
  // Rolling window: intraday shows last 6.5h; daily shows all available data
  const defaultWindow = isDailyData ? tSpan + 1000 : 6.5*3600*1000;
  const windowMs = opts.windowMs
    ? (isDailyData ? Math.max(opts.windowMs, tSpan + 1000) : opts.windowMs)
    : defaultWindow;
  const tNow = history[history.length-1].t;
  const data = history.filter(p => (tNow - p.t) <= windowMs);
  if (data.length < 2) return;
  const ts = data.map(p=>p.t), vs = data.map(p=>p.v);
  const tMin = ts[0], tMax = ts[ts.length-1];
  const vMin = Math.min(...vs, refLine ? refLine : Infinity);
  const vMax = Math.max(...vs, refLine ? refLine : -Infinity);
  const pad = (vMax - vMin) * 0.08 || 1;
  const lo = vMin - pad, hi = vMax + pad;
  const x = (t) => (tMax === tMin ? W : ((t - tMin)/(tMax - tMin))*W);
  const y = (v) => H - ((v - lo)/(hi - lo))*H;
  // reference line (prev close)
  if (refLine){
    ctx.strokeStyle = '#d1d5db'; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(0, y(refLine)); ctx.lineTo(W, y(refLine)); ctx.stroke();
    ctx.setLineDash([]);
  }
  // line
  ctx.lineWidth = 1.5;
  const last = data[data.length-1].v;
  ctx.strokeStyle = opts.lineColor || (
    refLine
      ? (last > refLine ? '#d92d20' : last < refLine ? '#1d4ed8' : '#374151')
      : '#374151'
  );
  ctx.beginPath();
  data.forEach((p,i)=>{
    const X = x(p.t), Y = y(p.v);
    if (i===0) ctx.moveTo(X,Y); else ctx.lineTo(X,Y);
  });
  ctx.stroke();
}

// --------- Per-card events ---------
function attachCardEvents(el, market, ticker){
  // Right click
  el.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    openGridSettings(ticker);
  });
  // Double click
  el.addEventListener('dblclick', () => openDetail(ticker));

  // Touch: long press → settings; swipe up → detail
  let touchStartT = 0, touchStartY = 0, touchStartX = 0;
  let longPressTimer = null;
  let touchMoved = false;

  el.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    const t = e.touches[0];
    touchStartT = Date.now();
    touchStartY = t.clientY;
    touchStartX = t.clientX;
    touchMoved = false;
    longPressTimer = setTimeout(()=>{
      if (!touchMoved){
        openGridSettings(ticker);
        if (navigator.vibrate) navigator.vibrate(30);
      }
    }, 550);
  }, {passive:true});

  el.addEventListener('touchmove', (e) => {
    if (e.touches.length !== 1) return;
    const t = e.touches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    if (Math.abs(dx) > 8 || Math.abs(dy) > 8){
      touchMoved = true;
      clearTimeout(longPressTimer);
    }
  }, {passive:true});

  el.addEventListener('touchend', (e) => {
    clearTimeout(longPressTimer);
    const dur = Date.now() - touchStartT;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    // Swipe up
    if (dy < -50 && Math.abs(dx) < 40 && dur < 600){
      openDetail(ticker);
    }
  });
}

// --------- Modals: Global Settings ---------
function openGlobalSettings(){
  $('#gs-kis-key').value     = state.settings.kisKey;
  $('#gs-kis-secret').value  = state.settings.kisSecret;
  $('#gs-kis-env').value     = state.settings.kisEnv;
  $('#gs-finnhub-key').value = state.settings.finnhubKey;
  $('#gs-refresh').value     = state.settings.refreshSec;
  $('#gs-proxy').value       = state.settings.proxyUrl;
  $('#globalSettingsModal').classList.add('open');
}
function closeGlobalSettings(){ $('#globalSettingsModal').classList.remove('open'); }
async function saveGlobalSettings(){
  state.settings.kisKey      = $('#gs-kis-key').value.trim();
  state.settings.kisSecret   = $('#gs-kis-secret').value.trim();
  state.settings.kisEnv      = $('#gs-kis-env').value;
  state.settings.finnhubKey  = $('#gs-finnhub-key').value.trim();
  state.settings.refreshSec  = Math.max(1, Math.min(10, +$('#gs-refresh').value || 1));
  state.settings.proxyUrl    = $('#gs-proxy').value.trim();
  closeGlobalSettings();
  await saveSettings();
  // restart connections
  state.kisToken = null;
  state.kisLastTokenAt = 0;
  state.settings.kisTokenData = null;
  finnhubWsConnect();
  startPolling();
}

// --------- Modals: Grid Settings ---------
let psEditingTicker = null;
function openGridSettings(ticker){
  const stock = findStock(ticker); if (!stock) return;
  psEditingTicker = ticker;
  $('#ps-title').textContent = stock.name + ' (' + ticker + ')';
  const market = state.stocks.kr.includes(stock) ? 'kr' : 'us';
  $('#ps-market').value = market;
  $('#ps-ticker').value = stock.ticker;
  $('#ps-name').value = stock.name;
  $('#ps-bgcolor').value = stock.bgColor || '#ffffff';
  // Fill past selects
  for (let i=0;i<4;i++){
    const sel = document.querySelector(`#gridSettingsModal select[data-past-idx="${i}"]`);
    sel.innerHTML = PAST_OPTIONS.map(o => `<option value="${o.key}">${escapeHtml(o.label)}</option>`).join('');
    sel.value = stock.past?.[i] || PAST_OPTIONS[i].key;
  }
  $('#gridSettingsModal').classList.add('open');
}
function closeGridSettings(){ $('#gridSettingsModal').classList.remove('open'); }
async function saveGridSettings(){
  if (!psEditingTicker) return;
  const stock = findStock(psEditingTicker); if (!stock) return;
  const newMarket = $('#ps-market').value;
  const newTicker = $('#ps-ticker').value.trim();
  const newName = $('#ps-name').value.trim() || newTicker;
  const newBgColor = $('#ps-bgcolor').value === '#ffffff' ? '' : $('#ps-bgcolor').value;
  const past = [];
  for (let i=0;i<4;i++){
    past.push(document.querySelector(`#gridSettingsModal select[data-past-idx="${i}"]`).value);
  }
  // Move between markets if changed
  const oldMarket = state.stocks.kr.includes(stock) ? 'kr' : 'us';
  if (newMarket !== oldMarket){
    const arr = state.stocks[oldMarket];
    const idx = arr.indexOf(stock);
    arr.splice(idx, 1);
    const replaced = {ticker:newTicker, name:newName, past, bgColor:newBgColor};
    state.stocks[newMarket].push(replaced);
  } else {
    stock.ticker = newTicker;
    stock.name = newName;
    stock.past = past;
    stock.bgColor = newBgColor;
  }
  delete state.prices[psEditingTicker]; // clear old data
  closeGridSettings();
  await saveSettings();
  renderGrids();
  refreshHistoricalAll();
  pollOnce();
}

// --------- Detail view ---------
function openDetail(ticker){
  state.detailTicker = ticker;
  const stock = findStock(ticker);
  const market = state.stocks.kr.includes(stock) ? 'kr' : 'us';
  $('#dv-title').textContent = stock.name;
  $('#dv-sub').textContent = ticker + ' · ' + (market==='kr'?'KOSPI':'NASDAQ');
  // NASDAQ fullscreen: unsubscribe other US tickers, poll focused ticker via REST at 60/min
  if (market === 'us'){
    const ws = state.finnhubWs;
    if (ws && ws.readyState === WebSocket.OPEN){
      state.stocks.us.forEach(s => {
        if (s.ticker !== ticker) ws.send(JSON.stringify({type:'unsubscribe', symbol:s.ticker}));
      });
    }
    if (state.detailPollTimer) clearInterval(state.detailPollTimer);
    state.detailPollTimer = setInterval(async () => {
      if (state.detailTicker !== ticker) return;
      try {
        const q = await finnhubQuote(ticker);
        if (q.price > 0){
          const ent = state.prices[ticker] || (state.prices[ticker] = {});
          ent.price = q.price;
          ent.history = ent.history || [];
          ent.history.push({t: Date.now(), v: q.price});
          if (ent.history.length > 5000) ent.history = ent.history.slice(-3000);
          renderCardPrice(ticker);
          renderDetailLive();
        }
      } catch(e){}
    }, 1000);
  }
  // 8 past selects
  const past = state.detailPast || ['1d','2d','3d','5d','1w','2w','1m','3m'];
  state.detailPast = past;
  const grid = $('#dv-past'); grid.innerHTML='';
  for (let i=0;i<8;i++){
    const cell = document.createElement('div'); cell.className = 'past-cell';
    const cur = past[i] || PAST_OPTIONS[i % PAST_OPTIONS.length].key;
    cell.innerHTML = `
      <div class="past-label">${escapeHtml(pastByKey(cur).label)}</div>
      <div class="past-val">—</div>
      <select>${PAST_OPTIONS.map(o=>`<option value="${o.key}">${escapeHtml(o.label)}</option>`).join('')}</select>
    `;
    const sel = cell.querySelector('select'); sel.value = cur;
    sel.addEventListener('change', () => {
      state.detailPast[i] = sel.value;
      cell.querySelector('.past-label').textContent = pastByKey(sel.value).label;
      renderDetailLive();
      saveSettings();
    });
    grid.appendChild(cell);
  }
  $('#detailView').classList.add('open');
  renderDetailLive();
  if (state.detailGraphHandle) cancelAnimationFrame(state.detailGraphHandle);
  const loop = () => {
    if (state.detailTicker !== ticker) return;
    renderDetailLive();
    state.detailGraphHandle = requestAnimationFrame(loop);
  };
  loop();
}
function closeDetail(){
  const prevTicker = state.detailTicker;
  const prevStock = prevTicker ? findStock(prevTicker) : null;
  const wasUS = prevStock && !state.stocks.kr.includes(prevStock);
  state.detailTicker = null;
  $('#detailView').classList.remove('open');
  if (state.detailGraphHandle) cancelAnimationFrame(state.detailGraphHandle);
  // NASDAQ fullscreen cleanup: stop REST poll, resubscribe all US tickers to WS
  if (wasUS){
    if (state.detailPollTimer){ clearInterval(state.detailPollTimer); state.detailPollTimer = null; }
    const ws = state.finnhubWs;
    if (ws && ws.readyState === WebSocket.OPEN){
      state.stocks.us.forEach(s => {
        if (s.ticker !== prevTicker) ws.send(JSON.stringify({type:'subscribe', symbol:s.ticker}));
      });
    }
  }
}
function renderDetailLive(){
  if (!state.detailTicker) return;
  const t = state.detailTicker;
  const p = state.prices[t] || {};
  const stock = findStock(t);
  const market = state.stocks.kr.includes(stock) ? 'kr' : 'us';
  const decimals = market==='kr' ? 0 : 2;
  $('#dv-price').textContent = p.price != null ? fmtNum(p.price, decimals) : '—';
  if (p.price != null && p.prevClose){
    const diff = p.price - p.prevClose;
    const pct = diff / p.prevClose * 100;
    const sign = diff > 0 ? '▲' : diff < 0 ? '▼' : '·';
    const cls = diff > 0 ? 'up' : diff < 0 ? 'down' : '';
    $('#dv-price').className = 'detail-price ' + cls;
    $('#dv-change').className = 'card-change ' + cls;
    $('#dv-change').textContent = `${sign} ${fmtNum(Math.abs(diff), decimals)} (${fmtPct(pct)})`;
  }
  const canvas = $('#dv-graph');
  if (p.history && p.history.length > 1){
    const graphColor = p.prevClose
      ? (p.price > p.prevClose ? '#d92d20' : p.price < p.prevClose ? '#1d4ed8' : '#374151')
      : '#374151';
    drawLineGraph(canvas, p.history, p.prevClose, {
      windowMs: 3*24*3600*1000,
      lineColor: graphColor
    });
  } else {
    const ctx = canvas.getContext('2d');
    if (canvas.width > 0) ctx.clearRect(0,0,canvas.width, canvas.height);
  }
  // past cells
  const cells = $$('#dv-past .past-cell');
  cells.forEach((cell, i) => {
    const key = state.detailPast[i];
    const val = p.pastCloses && p.pastCloses[key];
    cell.querySelector('.past-val').textContent = val != null ? fmtNum(val, decimals) : '—';
  });
}

// --------- Polling ---------
async function pollOne(stock, market){
  try {
    if (market === 'kr'){
      const q = await kisQuote(stock.ticker);
      const ent = state.prices[stock.ticker] || (state.prices[stock.ticker] = {});
      Object.assign(ent, q);
      ent.history = ent.history || [];
      if (q.price > 0){
        ent.history.push({t:Date.now(), v:q.price});
        if (ent.history.length > 5000) ent.history = ent.history.slice(-3000);
      }
      renderCardPrice(stock.ticker);
      if (state.detailTicker === stock.ticker) renderDetailLive();
    }
    // US: live prices via Finnhub WebSocket; prevClose from refreshHistoricalOne.
  } catch(e){
    console.warn('poll error', stock.ticker, e.message);
  }
}
let _kisPolling = false;
async function pollOnce(){
  if (_kisPolling) return; // skip if previous cycle hasn't finished
  _kisPolling = true;
  try {
    // Fire all polls; _kisLimiter serialises the actual HTTP requests at ≤15 req/sec
    for (const s of state.stocks.kr) await pollOne(s, 'kr');
  } finally {
    _kisPolling = false;
  }
  // US: live prices via Finnhub WebSocket; no REST polling needed.
}
function startPolling(){
  if (state.pollTimer) clearInterval(state.pollTimer);
  const sec = Math.max(1, state.settings.refreshSec);
  pollOnce();
  state.pollTimer = setInterval(pollOnce, sec * 1000);
}

// --------- Historical fetch (PER/ROE + past closes) ---------
async function refreshHistoricalAll(){
  await Promise.allSettled(state.stocks.kr.map(s => refreshHistoricalOne(s, 'kr')));
  // US: await each stock sequentially with 1200ms gap to stay under Finnhub 60 req/min limit.
  // 2 Finnhub calls per stock × 1 stock per ~1.5s = ~1.3 req/sec, safely within limit.
  for (let i = 0; i < state.stocks.us.length; i++){
    await refreshHistoricalOne(state.stocks.us[i], 'us');
    if (i < state.stocks.us.length - 1) await new Promise(r => setTimeout(r, 1200));
  }
}
async function refreshHistoricalOne(stock, market){
  try {
    const ent = state.prices[stock.ticker] || (state.prices[stock.ticker] = {});
    ent.pastCloses = ent.pastCloses || {};
    let hist = [];
    if (market === 'kr'){
      try { hist = await kisDailyHistory(stock.ticker); } catch(e){ hist = []; }
    } else {
      // Step 1: Finnhub quote — always gives prevClose + 1d past close (fast, reliable)
      try {
        const q = await finnhubQuote(stock.ticker);
        if (q.prevClose > 0){
          if (ent.prevClose == null) ent.prevClose = q.prevClose;
          ent.pastCloses['1d'] = q.prevClose;
        }
        if (q.price > 0 && ent.price == null) ent.price = q.price;
      } catch(e){}
      // Step 2: PER / ROE from Finnhub metrics
      try { const m = await finnhubMetrics(stock.ticker); ent.per = m.per; ent.roe = m.roe; } catch(e){}
      // Step 3: Daily history for 2d/3d/1w/… past closes (Yahoo v8 direct or via proxy)
      // Finnhub daily candles = 403 premium. Stooq = connection timeout. Both removed.
      // Yahoo works on deployed domains; may be CORS-blocked from localhost.
      hist = await yahooHistoryUS(stock.ticker);
    }
    if (hist.length){
      const allKeys = new Set();
      [...(stock.past||[]), ...(state.detailPast||[])].forEach(k => allKeys.add(k));
      allKeys.forEach(k => {
        let idx;
        if (['1d','2d','3d','4d','5d'].includes(k)) idx = pastByKey(k).days - 1;
        else if (k==='1w') idx = 4;
        else if (k==='2w') idx = 9;
        else if (k==='1m') idx = 20;
        else if (k==='3m') idx = 62;
        else if (k==='6m') idx = 125;
        else if (k==='1y') idx = 251;
        else idx = pastByKey(k).days - 1;
        const v = hist[Math.min(idx, hist.length-1)]?.close ?? null;
        // For 1d: history[0] is today's most-recent data which may differ from yesterday's
        // actual close; prefer the Finnhub quote value already set above (= true prev close)
        if (v != null && !(k === '1d' && ent.pastCloses['1d'] != null)) ent.pastCloses[k] = v;
      });
      if (ent.prevClose == null) ent.prevClose = hist[0].close;
      const open = market === 'kr' ? isMarketKR_open() : isMarketUS_open();
      if (!open && ent.price == null) ent.price = hist[0].close;
      // Graph fallback: synthesize from daily closes when no intraday data available
      if (!ent.history || ent.history.length < 2){
        ent.history = dailyHistoryToGraphPoints(hist);
        if (!ent.price) ent.price = hist[0].close;
      }
    }
    // When Yahoo daily history is unavailable (CORS from localhost or rate-limit),
    // seed the graph with a flat prevClose baseline so the card doesn't look empty.
    // The WS bootstrap will replace this with real price movement on first trade.
    if (market === 'us' && (!ent.history || ent.history.length < 2) && ent.prevClose > 0){
      const now = Date.now();
      ent.history = [{t: now - 6.5*3600*1000, v: ent.prevClose}, {t: now, v: ent.prevClose}];
      if (!ent.price) ent.price = ent.prevClose;
    }
    renderCardFull(stock.ticker);
    if (state.detailTicker === stock.ticker) renderDetailLive();
  } catch(e){
    console.warn('historical', stock.ticker, e.message);
  }
}

// --------- Init ---------
async function init(){
  // wire global UI
  $('#globalSettingsBtn').addEventListener('click', openGlobalSettings);
  $('#gs-cancel').addEventListener('click', closeGlobalSettings);
  $('#gs-save').addEventListener('click', saveGlobalSettings);
  $('#ps-cancel').addEventListener('click', closeGridSettings);
  $('#ps-save').addEventListener('click', saveGridSettings);
  $('#dv-close').addEventListener('click', closeDetail);
  $('#dv-settings').addEventListener('click', () => { if (state.detailTicker) openGridSettings(state.detailTicker); });

  // Auto-fetch stock name when ticker input changes
  let _nameTimer = null;
  $('#ps-ticker').addEventListener('input', () => {
    clearTimeout(_nameTimer);
    const ticker = $('#ps-ticker').value.trim();
    if (!ticker) return;
    _nameTimer = setTimeout(async () => {
      const market = $('#ps-market').value;
      $('#ps-name-loading').style.display = 'inline';
      const name = await fetchStockName(ticker, market);
      $('#ps-name-loading').style.display = 'none';
      if (name) $('#ps-name').value = name;
    }, 600);
  });
  // Also re-trigger when market changes with a ticker already entered
  $('#ps-market').addEventListener('change', () => {
    const ticker = $('#ps-ticker').value.trim();
    if (!ticker) return;
    clearTimeout(_nameTimer);
    _nameTimer = setTimeout(async () => {
      const market = $('#ps-market').value;
      $('#ps-name-loading').style.display = 'inline';
      const name = await fetchStockName(ticker, market);
      $('#ps-name-loading').style.display = 'none';
      if (name) $('#ps-name').value = name;
    }, 300);
  });
  $('#ps-bgcolor-reset').addEventListener('click', () => { $('#ps-bgcolor').value = '#ffffff'; });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape'){
      closeDetail(); closeGridSettings(); closeGlobalSettings();
    }
  });

  // Load settings or use defaults
  const loaded = await loadSettings();
  if (loaded && loaded.global && loaded.stocks){
    state.settings = Object.assign(makeDefaultGlobal(), loaded.global);
    state.stocks = loaded.stocks;
    // Hydrate any missing fields
    state.stocks.kr.forEach(s => {
      if (!s.past || !s.past.length) s.past = ['1d','2d','3d','1w'];
      if (s.bgColor === undefined) s.bgColor = '';
    });
    state.stocks.us.forEach(s => {
      if (!s.past || !s.past.length) s.past = ['1d','2d','3d','1w'];
      if (s.bgColor === undefined) s.bgColor = '';
    });
    state.detailPast = loaded.detailPast || ['1d','2d','3d','5d','1w','2w','1m','3m'];
    // Restore KIS token if still valid (saves one token request on startup)
    const td = state.settings.kisTokenData;
    if (td && td.access_token && td.expires_at > Date.now() + 60000){
      state.kisToken = { access_token: td.access_token, expires_at: td.expires_at };
      console.log('[KIS] Token restored from cloud, valid until', new Date(td.expires_at).toLocaleString());
    }
    setStatus('설정 로드 완료', 'ok');
  } else {
    state.settings = makeDefaultGlobal();
    state.stocks = makeDefaultStocks();
    state.detailPast = ['1d','2d','3d','5d','1w','2w','1m','3m'];
    setStatus('기본 설정 사용 — ⚙ 에서 API 키를 입력하세요');
  }

  renderGrids();

  // Connect data sources
  finnhubWsConnect();
  startPolling();
  refreshHistoricalAll();

  // Refresh historical once per hour
  setInterval(refreshHistoricalAll, 60*60*1000);
  // Re-evaluate market open every minute (updates "장마감" tag and graph visibility)
  setInterval(() => {
    state.stocks.kr.forEach(s => renderCardFull(s.ticker));
    state.stocks.us.forEach(s => renderCardFull(s.ticker));
    if (state.detailTicker) renderDetailLive();
  }, 60*1000);

  // Repaint graphs on resize
  window.addEventListener('resize', () => {
    state.stocks.kr.concat(state.stocks.us).forEach(s => {
      const card = findCard(s.ticker);
      if (card) drawCardGraph(card, state.prices[s.ticker] || {});
    });
    if (state.detailTicker) renderDetailLive();
  });
}

document.addEventListener('DOMContentLoaded', init);
